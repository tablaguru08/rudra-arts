services:
  server:
    build:
      context: ./Server
    container_name: rudra-arts-server
    restart: unless-stopped
    env_file:
      - ./Server/.env
    environment:
      PORT: 5000
      FRONTEND_ORIGINS: http://localhost,http://www.rudraartsandhandicrafts.in,http://rudraartsandhandicrafts.in,https://www.rudraartsandhandicrafts.in,https://rudraartsandhandicrafts.in
    expose:
      - "5000"

  client:
    build:
      context: ./Client
      args:
        VITE_API_BASE_URL: ""
        VITE_BASE_URL_PRODUCTION: ""
    container_name: rudra-arts-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"

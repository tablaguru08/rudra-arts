services:
  server:
    build:
      context: ./Server
    container_name: rudra-arts-server
    restart: unless-stopped
    env_file:
      - ./Server/.env
    environment:
      PORT: 5000
    expose:
      - "5000"

  client:
    build:
      context: ./Client
    container_name: rudra-arts-client
    restart: unless-stopped
    depends_on:
      - server
    expose:
      - "80"

  nginx:
    image: nginx:latest
    container_name: rudra-nginx
    restart: unless-stopped
    depends_on:
      - client
      - server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
